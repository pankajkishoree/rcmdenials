<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image Generator — Save as og-image.png</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; }

  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, hsl(222, 28%, 7%) 0%, hsl(222, 24%, 10%) 40%, hsl(222, 22%, 13%) 100%);
    border: 2px solid rgba(0,212,184,0.3);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,184,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  .content {
    position: relative; z-index: 1;
    text-align: center;
    padding: 60px;
  }

  .logo {
    font-size: 56px;
    font-weight: 900;
    color: #00d4b8;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }

  .logo span { color: #818cf8; }

  .tagline {
    font-size: 22px;
    color: hsl(210, 15%, 68%);
    font-weight: 500;
    margin-bottom: 40px;
    letter-spacing: -0.5px;
  }

  .features {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
  }

  .feature-icon {
    font-size: 24px;
  }

  .feature-text {
    font-size: 15px;
    font-weight: 600;
    color: hsl(210, 25%, 95%);
  }

  .url {
    font-size: 16px;
    color: rgba(0,212,184,0.7);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .dots {
    position: absolute;
    top: 40px; right: 40px;
    display: flex; gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot:nth-child(1) { background: #00d4b8; }
  .dot:nth-child(2) { background: #818cf8; }
  .dot:nth-child(3) { background: #f59e0b; }

  .instructions {
    position: fixed;
    bottom: 20px;
    color: #666;
    font-size: 14px;
    text-align: center;
  }
  .instructions strong { color: #00d4b8; }
</style>
</head>
<body>

<div class="card">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="content">
    <div class="logo">RCM<span>Denials</span></div>
    <div class="tagline">Master Medical Claim Denials — Decision Trees, Timely Filing & Strategies</div>
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🌳</span>
        <span class="feature-text">Decision Trees</span>
      </div>
      <div class="feature">
        <span class="feature-icon">⏰</span>
        <span class="feature-text">Filing Deadlines</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📊</span>
        <span class="feature-text">Denial Analytics</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔍</span>
        <span class="feature-text">Searchable Codes</span>
      </div>
    </div>
    <div class="url">rcmdenials.com</div>
  </div>
</div>

<div class="instructions">
  <strong>Screenshot this at 1200×630</strong> and save as <strong>og-image.png</strong> in the site root, then delete this file.
</div>

</body>
</html>
